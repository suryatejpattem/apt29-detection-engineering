title: Suspicious PowerShell Encoded Command
id: a1b2c3d4-0001-0000-0000-000000000001
status: experimental
description: Detects PowerShell executed with an encoded command flag (-e/-enc/-EncodedCommand), used to obfuscate malicious commands.
references:
  - https://attack.mitre.org/techniques/T1059/001/
tags:
  - attack.execution
  - attack.t1059.001
logsource:
  category: process_creation
  product: windows
detection:
  selection_img:
    Image|endswith: '\powershell.exe'
  selection_flag:
    CommandLine|contains:
      - ' -e '
      - ' -enc'
      - ' -EncodedCommand'
  condition: selection_img and selection_flag
falsepositives:
  - Legitimate administrative scripts using encoded commands (rare)
level: medium